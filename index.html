<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmad Bhai - Pro Pastebin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon: #00d2ff; --dark: #0b0e14; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
        body { background: var(--dark); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .card { 
            width: 100%; max-width: 700px; background: rgba(255,255,255,0.02); 
            padding: 40px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(15px); box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .logo { font-size: 50px; color: var(--neon); text-shadow: 0 0 15px var(--neon); margin-bottom: 10px; }
        h1 { font-size: 24px; margin-bottom: 30px; letter-spacing: 1px; }

        input, select, textarea {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid #333;
            color: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; outline: none; transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--neon); box-shadow: 0 0 10px rgba(0, 210, 255, 0.2); }
        
        textarea { height: 250px; font-family: 'Courier New', monospace; font-size: 14px; }

        .btn {
            width: 100%; background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            color: white; border: none; padding: 18px; border-radius: 15px;
            font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 16px;
        }
        .btn:hover { transform: scale(1.02); box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3); }

        .output { 
            margin-top: 25px; display: none; background: rgba(0, 210, 255, 0.1); 
            padding: 15px; border-radius: 12px; border: 1px border var(--neon);
            animation: fadeIn 0.5s ease;
        }
        #resLink { color: var(--neon); font-weight: bold; word-break: break-all; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="card">
    <center>
        <div class="logo"><i class="fa-solid fa-paste"></i></div>
        <h1>AHMAD BHAI PASTE</h1>
    </center>

    <input type="text" id="pTitle" placeholder="Paste Title (Optional)">
    
    <select id="pFormat">
        <option value="text">Plain Text</option>
        <option value="javascript">JavaScript</option>
        <option value="php">PHP</option>
        <option value="python">Python</option>
        <option value="html5">HTML</option>
    </select>

    <textarea id="pCode" placeholder="Enter your code or text here..."></textarea>
    
    <button class="btn" id="subBtn" onclick="sendPaste()">🚀 DEPLOY PASTE</button>

    <div class="output" id="outBox">
        <p style="font-size: 13px; margin-bottom: 5px;">✅ Generated Link:</p>
        <a href="#" id="resLink" target="_blank"></a>
    </div>
</div>

<script>
    async function sendPaste() {
        const btn = document.getElementById('subBtn');
        const code = document.getElementById('pCode').value;
        const title = document.getElementById('pTitle').value;
        const format = document.getElementById('pFormat').value;

        if(!code) return alert("Kuch likho toh sahi, Bhai!");

        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';

        try {
            const res = await fetch('/api/paste', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code, title, format })
            });

            const data = await res.json();

            if(data.success) {
                document.getElementById('outBox').style.display = 'block';
                document.getElementById('resLink').href = data.url;
                document.getElementById('resLink').innerText = data.url;
                btn.innerHTML = '✅ SUCCESS';
            } else {
                alert("Error: " + data.message);
                btn.innerHTML = '🚀 DEPLOY PASTE';
                btn.disabled = false;
            }
        } catch (e) {
            alert("Connection Failed!");
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
