<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmad Bhai | Paste Bin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon: #00d2ff; --bg: #0b0e14; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
        body { background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { width: 100%; max-width: 600px; background: rgba(255,255,255,0.03); padding: 30px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); text-align: center; }
        textarea { width: 100%; height: 200px; background: #161b22; border: 1px solid #333; color: #00ff00; padding: 15px; border-radius: 12px; margin: 15px 0; font-family: monospace; outline: none; }
        input, select { width: 100%; background: #161b22; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; margin-bottom: 10px; outline: none; }
        .btn { width: 100%; background: linear-gradient(90deg, #00d2ff, #3a7bd5); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .res-box { margin-top: 20px; padding: 15px; background: rgba(0,255,0,0.1); border: 1px solid #00ff00; border-radius: 10px; display: none; }
        #toast { position: fixed; bottom: -50px; left: 50%; transform: translateX(-50%); background: #ff4757; color: white; padding: 10px 20px; border-radius: 20px; transition: 0.5s; }
        #toast.show { bottom: 20px; }
    </style>
</head>
<body>

<div class="card">
    <i class="fa-solid fa-bolt" style="font-size: 40px; color: var(--neon);"></i>
    <h1 style="margin-bottom: 20px;">Ahmad Bhai Paste</h1>
    
    <input type="text" id="t" placeholder="Title">
    <select id="f">
        <option value="text">Text</option>
        <option value="javascript">JavaScript</option>
    </select>
    <textarea id="c" placeholder="Paste code here..."></textarea>
    
    <button class="btn" id="b" onclick="go()">🚀 Create Paste</button>

    <div class="res-box" id="rb">
        <p style="font-size: 12px;">Link Generated:</p>
        <a href="#" id="rl" target="_blank" style="color: var(--neon); font-weight: bold;"></a>
    </div>
</div>

<div id="toast">Error Notification</div>

<script>
    async function go() {
        const btn = document.getElementById('b');
        const code = document.getElementById('c').value;
        if(!code) return msg("⚠️ Write something!");

        btn.disabled = true;
        btn.innerText = "⏳ Processing...";

        try {
            const res = await fetch('/api/paste', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code, title: document.getElementById('t').value, format: document.getElementById('f').value })
            });
            const data = await res.json();
            if(data.success) {
                document.getElementById('rb').style.display = 'block';
                document.getElementById('rl').innerText = data.url;
                document.getElementById('rl').href = data.url;
                btn.innerText = "✅ Done";
            } else {
                msg("❌ " + data.message);
                reset(btn);
            }
        } catch (e) {
            msg("❌ Server Connection Error!");
            reset(btn);
        }
    }
    function msg(m) { const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 3000); }
    function reset(b) { b.disabled = false; b.innerText = "🚀 Create Paste"; }
</script>
</body>
</html>
