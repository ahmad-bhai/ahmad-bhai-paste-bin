<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AhmadDev — Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --g:#00ff88;--b:#00cfff;--r:#ff3366;--y:#ffcc00;--pu:#a855f7;
  --bg:#03080d;--bg2:#060f18;--panel:#081525;--panel2:#0a1c2e;
  --border:rgba(0,255,136,0.12);--text:#cce8f0;--muted:#3d6070;
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;overflow-x:hidden;min-height:100vh;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--g);}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.03) 3px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:9998;}
.gbg{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(0,255,136,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,.018) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;}

/* PAGES */
.page{display:none;min-height:100vh;position:relative;z-index:1;}
.page.active{display:block;}

/* ── AUTH ── */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
.auth-box{width:100%;max-width:420px;background:var(--panel);border:1px solid var(--border);border-top:2px solid var(--r);padding:2.5rem;}
.auth-logo{text-align:center;margin-bottom:2rem;}
.auth-logo-txt{font-family:'Orbitron',sans-serif;font-size:1.3rem;font-weight:900;color:var(--r);text-shadow:0 0 22px rgba(255,51,102,.4);letter-spacing:.15em;}
.auth-logo-sub{font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--muted);letter-spacing:.25em;margin-top:.3rem;}
.fgroup{margin-bottom:1.2rem;}
.fgroup label{display:block;font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--g);letter-spacing:.22em;margin-bottom:.4rem;}
.fgroup input,.fgroup select,.fgroup textarea{width:100%;background:rgba(0,0,0,.4);border:1px solid var(--border);color:var(--text);padding:.8rem 1rem;font-family:'Share Tech Mono',monospace;font-size:.8rem;outline:none;transition:border-color .3s;resize:vertical;}
.fgroup input:focus,.fgroup select:focus,.fgroup textarea:focus{border-color:rgba(0,255,136,.4);}
.fgroup input::placeholder,.fgroup textarea::placeholder{color:var(--muted);}
.fbtn{width:100%;padding:1rem;font-family:'Orbitron',sans-serif;font-size:.85rem;font-weight:700;border:none;cursor:pointer;letter-spacing:.1em;transition:all .3s;}
.fbtn.red{background:var(--r);color:#fff;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));}
.fbtn.red:hover{background:#ff5577;box-shadow:0 0 28px rgba(255,51,102,.4);}
.err-msg{background:rgba(255,51,102,.08);border:1px solid rgba(255,51,102,.25);color:var(--r);font-family:'Share Tech Mono',monospace;font-size:.7rem;padding:.6rem 1rem;margin-bottom:1rem;display:none;}
.err-msg.show{display:block;}

/* ── LAYOUT ── */
.admin-wrap{display:flex;min-height:100vh;}
.sidebar{width:240px;background:var(--bg2);border-right:1px solid var(--border);position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:100;display:flex;flex-direction:column;}
.sb-logo{padding:1.4rem 1.5rem;border-bottom:1px solid var(--border);}
.sb-logo-txt{font-family:'Orbitron',sans-serif;font-size:.88rem;font-weight:900;color:var(--r);letter-spacing:.12em;}
.sb-logo-sub{font-family:'Share Tech Mono',monospace;font-size:.55rem;color:var(--muted);margin-top:.2rem;}
.sb-admin-badge{margin:.8rem 1.5rem;background:rgba(255,51,102,.07);border:1px solid rgba(255,51,102,.2);padding:.4rem .8rem;font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--r);letter-spacing:.15em;text-align:center;}
.sb-nav{padding:.8rem 0;flex:1;}
.sb-nav a{display:flex;align-items:center;gap:.8rem;padding:.72rem 1.5rem;font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--muted);text-decoration:none;letter-spacing:.1em;transition:all .3s;border-left:2px solid transparent;cursor:pointer;}
.sb-nav a:hover,.sb-nav a.act{color:var(--g);border-left-color:var(--g);background:rgba(0,255,136,.04);}
.sb-nav .section-label{padding:.8rem 1.5rem .3rem;font-family:'Share Tech Mono',monospace;font-size:.55rem;color:var(--muted);letter-spacing:.25em;opacity:.6;}
.sb-bottom{padding:1rem 1.5rem;border-top:1px solid var(--border);}
.sb-logout{display:flex;align-items:center;gap:.7rem;font-family:'Share Tech Mono',monospace;font-size:.68rem;color:var(--r);cursor:pointer;padding:.5rem 0;transition:opacity .3s;}
.sb-logout:hover{opacity:.7;}
.main{margin-left:240px;flex:1;padding:2rem;min-height:100vh;}
.page-header{margin-bottom:2rem;padding-bottom:1.2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;}
.page-header h2{font-family:'Orbitron',sans-serif;font-size:1.2rem;font-weight:700;color:var(--text);}
.page-header h2 span{color:var(--g);}
.page-header p{font-family:'Share Tech Mono',monospace;font-size:.68rem;color:var(--muted);margin-top:.2rem;}
.dsec{display:none;}
.dsec.act{display:block;}

/* ── STAT CARDS ── */
.stat-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1rem;margin-bottom:2rem;}
.scard{background:var(--panel);border:1px solid var(--border);padding:1.4rem;position:relative;overflow:hidden;transition:border-color .3s;}
.scard:hover{border-color:rgba(0,255,136,.22);}
.scard::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--g),transparent);}
.scard-icon{font-size:1.6rem;margin-bottom:.7rem;}
.scard-val{font-family:'Orbitron',sans-serif;font-size:1.7rem;font-weight:700;}
.scard-val.g{color:var(--g);}
.scard-val.b{color:var(--b);}
.scard-val.y{color:var(--y);}
.scard-val.r{color:var(--r);}
.scard-label{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--muted);margin-top:.3rem;letter-spacing:.15em;}

/* ── TABLE ── */
.tbl-wrap{background:var(--panel);border:1px solid var(--border);overflow:hidden;margin-bottom:1.5rem;}
.tbl-head{padding:1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
.tbl-title{font-family:'Orbitron',sans-serif;font-size:.85rem;font-weight:700;color:var(--text);}
table{width:100%;border-collapse:collapse;}
th{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--muted);letter-spacing:.18em;padding:.75rem 1.1rem;text-align:left;border-bottom:1px solid var(--border);background:rgba(0,0,0,.15);white-space:nowrap;}
td{font-family:'Share Tech Mono',monospace;font-size:.73rem;color:var(--text);padding:.8rem 1.1rem;border-bottom:1px solid rgba(255,255,255,.03);vertical-align:middle;}
.badge{display:inline-block;padding:.15rem .55rem;border:1px solid;font-family:'Share Tech Mono',monospace;font-size:.56rem;letter-spacing:.1em;}
.badge.pending{color:var(--y);border-color:rgba(255,204,0,.35);background:rgba(255,204,0,.05);}
.badge.approved{color:var(--g);border-color:rgba(0,255,136,.35);background:rgba(0,255,136,.05);}
.badge.declined{color:var(--r);border-color:rgba(255,51,102,.35);background:rgba(255,51,102,.05);}

/* ── TOAST ── */
.toast{position:fixed;bottom:2rem;right:2rem;font-family:'Share Tech Mono',monospace;font-size:.76rem;padding:.8rem 1.4rem;z-index:9999;transform:translateX(150%);transition:transform .4s;font-weight:700;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,0 100%);}
.toast.show{transform:translateX(0);}
.toast.green{background:var(--g);color:#020a05;}
.toast.red{background:var(--r);color:#fff;}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:rgba(3,8,13,.95);z-index:9000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;}
.loading-spinner{width:44px;height:44px;border:2px solid var(--border);border-top-color:var(--r);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="gbg"></div>
<div class="toast" id="toast"></div>
<div class="loading-overlay" id="loadingOverlay"><div class="loading-spinner"></div></div>

<div class="page active" id="page-login">
  <div class="auth-wrap">
    <div class="auth-box">
      <div class="auth-logo">
        <div class="auth-logo-txt">⚙ ADMIN PANEL</div>
        <div class="auth-logo-sub">// AHMADDEV CONTROL</div>
      </div>
      <div class="err-msg" id="login-err"></div>
      <div class="fgroup"><label>USERNAME</label><input type="text" id="adm-user" placeholder="admin"/></div>
      <div class="fgroup"><label>PASSWORD</label><input type="password" id="adm-pw" placeholder="••••••••"/></div>
      <button class="fbtn red" onclick="doAdminLogin()">🔐 LOGIN TO ADMIN</button>
    </div>
  </div>
</div>

<div class="page" id="page-admin">
  <div class="admin-wrap">
    <div class="sidebar">
      <div class="sb-logo"><div class="sb-logo-txt">⚙ ADMIN</div></div>
      <div class="sb-admin-badge">🔴 ADMINISTRATOR</div>
      <nav class="sb-nav">
        <a class="act" onclick="aTab(this,'sec-dash')">📊 Dashboard</a>
        <a onclick="aTab(this,'sec-users')">👥 Users</a>
        <a onclick="aTab(this,'sec-deposits')">💰 Deposits</a>
      </nav>
      <div class="sb-bottom"><div class="sb-logout" onclick="adminLogout()">🚪 LOGOUT</div></div>
    </div>

    <main class="main">
      <div class="dsec act" id="sec-dash">
        <div class="page-header"><h2>Admin <span>Dashboard</span></h2></div>
        <div class="stat-row">
          <div class="scard"><div class="scard-val g" id="d-users">0</div><div class="scard-label">TOTAL USERS</div></div>
          <div class="scard"><div class="scard-val b" id="d-balance">$0</div><div class="scard-label">TOTAL DEPOSITS</div></div>
        </div>
      </div>

      <div class="dsec" id="sec-users">
        <div class="page-header"><h2>Manage <span>Users</span></h2></div>
        <div class="tbl-wrap" id="users-table"></div>
      </div>

      <div class="dsec" id="sec-deposits">
        <div class="page-header"><h2>Manage <span>Deposits</span></h2></div>
        <div class="tbl-wrap" id="deposits-table"></div>
      </div>
    </main>
  </div>
</div>

<script>
/* ═════════════════════════════
   DB & AUTH LOGIC - FIXED
═════════════════════════════ */
function loadDB(){
    try {
        let data = localStorage.getItem('ahmadDevDB');
        return data ? JSON.parse(data) : initDB();
    } catch(e) {
        return initDB();
    }
}

function initDB(){
    const initial = {
        users: [],
        transactions: [],
        products: [
            {id:'p1',name:'Quotex Scripts',price:30},
            {id:'p2',name:'ID Verify Bot',price:40}
        ],
        settings: {
            minDeposit: 10,
            admin: {username: 'admin', password: 'ahmad786admin'}
        },
        admin: {username: 'admin', password: 'ahmad786admin'},
        logs: []
    };
    localStorage.setItem('ahmadDevDB', JSON.stringify(initial));
    return initial;
}

let DB = loadDB();
let adminLoggedIn = false;

function doAdminLogin(){
    const u = document.getElementById('adm-user').value.trim();
    const p = document.getElementById('adm-pw').value;
    const err = document.getElementById('login-err');
    
    DB = loadDB();

    if(u === DB.admin.username && p === DB.admin.password){
        adminLoggedIn = true;
        document.getElementById('page-login').classList.remove('active');
        document.getElementById('page-admin').classList.add('active');
        refreshAll();
        showToast('Welcome Ahmad Bhai!', 'green');
    } else {
        err.textContent = 'Invalid Credentials!';
        err.classList.add('show');
    }
}

function adminLogout(){
    adminLoggedIn = false;
    document.getElementById('page-admin').classList.remove('active');
    document.getElementById('page-login').classList.add('active');
}

/* ═════════════════════════════
   NAVIGATION & UI
═════════════════════════════ */
function aTab(el, secId){
    document.querySelectorAll('.sb-nav a').forEach(a => a.classList.remove('act'));
    if(el) el.classList.add('act');
    document.querySelectorAll('.dsec').forEach(s => s.classList.remove('act'));
    document.getElementById(secId).classList.add('act');
}

function refreshAll(){
    DB = loadDB();
    document.getElementById('d-users').textContent = DB.users.length;
    // Add more dashboard stats here
}

function showToast(msg, type){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    setTimeout(() => t.className = 'toast', 3000);
}

window.addEventListener('load', () => {
    document.getElementById('loadingOverlay').style.display = 'none';
});
</script>
</body>
</html>
